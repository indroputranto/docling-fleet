<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Login · Fleet Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; background: #0d1117; color: rgba(255,255,255,.88);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      width: 100%; max-width: 380px; padding: 40px 36px;
      background: #161b22; border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-mark {
      width: 36px; height: 36px; background: #0f3460; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .logo-text { font-size: 16px; font-weight: 700; }
    .logo-sub  { font-size: 12px; color: rgba(255,255,255,.4); margin-top: 1px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    p  { font-size: 13px; color: rgba(255,255,255,.45); margin-bottom: 26px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 12px; font-weight: 500; color: rgba(255,255,255,.5); }
    input {
      background: #0d1117; border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px; padding: 10px 12px; color: rgba(255,255,255,.88);
      font-family: inherit; font-size: 14px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: #0f3460; }
    .btn {
      width: 100%; padding: 10px; background: #0f3460; border: none;
      border-radius: 8px; color: #fff; font-family: inherit; font-size: 14px;
      font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .flash-error {
      background: rgba(218,54,51,.15); border: 1px solid rgba(218,54,51,.3);
      color: #f85149; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 18px;
    }
    .chat-link {
      display: block; text-align: center; margin-top: 20px;
      font-size: 12px; color: rgba(255,255,255,.3); text-decoration: none;
    }
    .chat-link:hover { color: rgba(255,255,255,.6); }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <div class="logo-mark">CM</div>
      <div>
        <div class="logo-text">Fleet CMS</div>
        <div class="logo-sub">Administration Panel</div>
      </div>
    </div>

    <h1>Sign in</h1>
    <p>Admin access only. Use your platform credentials.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="admin@yourplatform.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn">Sign in to CMS</button>
    </form>

    <a href="/" class="chat-link">← Back to Chat</a>
  </div>
</body>
</html>
