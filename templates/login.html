<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · Fleet Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   rgba(255,255,255,0.08);
      --text:     rgba(255,255,255,0.88);
      --muted:    rgba(255,255,255,0.42);
      --accent:   #0f3460;
      --radius:   12px;
    }

    [data-theme="light"] {
      --bg:       #f0f2f5;
      --surface:  #ffffff;
      --border:   rgba(0,0,0,0.08);
      --text:     #1a1d23;
      --muted:    rgba(26,29,35,0.45);
      --accent:   #0f3460;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, color .2s;
    }

    .login-card {
      width: 100%; max-width: 380px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    }

    [data-theme="light"] .login-card {
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    /* Logo row */
    .logo {
      display: flex; align-items: center; gap: 11px; margin-bottom: 30px;
    }
    .logo-mark {
      width: 38px; height: 38px; background: var(--accent);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .logo-name { font-size: 15px; font-weight: 700; }
    .logo-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 5px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 26px; }

    /* Flash */
    .flash-error {
      background: rgba(218,54,51,.15); border: 1px solid rgba(218,54,51,.3);
      color: #f85149; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 18px;
    }
    [data-theme="light"] .flash-error {
      background: rgba(185,28,28,.08); border-color: rgba(185,28,28,.25);
      color: #b91c1c;
    }

    /* Form */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    label { font-size: 12px; font-weight: 500; color: var(--muted); }
    input {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text);
      font-family: inherit; font-size: 14px; outline: none;
      transition: border-color .15s; width: 100%;
    }
    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%; padding: 10px; background: var(--accent); border: none;
      border-radius: 8px; color: #fff; font-family: inherit; font-size: 14px;
      font-weight: 600; cursor: pointer; margin-top: 10px; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }

    /* Footer links */
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border);
    }
    .card-footer a {
      font-size: 12px; color: var(--muted); text-decoration: none;
      transition: color .12s;
    }
    .card-footer a:hover { color: var(--text); }

    /* Theme toggle */
    #theme-toggle {
      position: fixed; top: 18px; right: 18px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 8px;
      cursor: pointer; color: var(--muted);
      display: flex; align-items: center;
      transition: background .15s, color .15s;
    }
    #theme-toggle:hover { color: var(--text); }
  </style>
</head>
<body>

<!-- Theme toggle (top-right) -->
<button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">
  <svg id="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
  <svg id="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
</button>

<div class="login-card">
  <div class="logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Fleet Assistant</div>
      <div class="logo-sub">Maritime AI Platform</div>
    </div>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to access your fleet knowledge base.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('chat_login', next=request.args.get('next', '/')) }}">
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@company.com" required autofocus />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />
    </div>
    <button type="submit" class="btn">Sign in</button>
  </form>

  <div class="card-footer">
    <a href="/cms/login">CMS Admin access →</a>
    <span style="font-size:12px; color:var(--muted);">Fleet Manager</span>
  </div>
</div>

<script>
function _setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  document.getElementById('icon-moon').style.display = t === 'dark'  ? 'block' : 'none';
  document.getElementById('icon-sun').style.display  = t === 'light' ? 'block' : 'none';
}
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'dark';
  _setTheme(current === 'dark' ? 'light' : 'dark');
}
// Apply saved theme on load
(function() { _setTheme(localStorage.getItem('theme') || 'dark'); })();
</script>
</body>
</html>
